<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | The Future of Living</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,10 90,90 10,90' fill='none' stroke='%2300f2ff' stroke-width='3'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-cyan: #00f2ff;
            --accent-purple: #bd00ff;
            --card-bg: rgba(20, 20, 20, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
            --ease-smooth: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: "Space Grotesk", sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        .nav-bar {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            mix-blend-mode: difference;
        }

        .logo {
            font-family: "Syne", sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.05em;
        }

        .date-display {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #fff;
        }

        header {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 5%;
            position: relative;
            z-index: 10;
        }

        .hero-title {
            font-family: "Syne", sans-serif;
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 800;
            line-height: 1.1;
            text-align: center;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            letter-spacing: -0.03em;
            max-width: 100%;
            word-wrap: break-word;
        }

        .hero-tags {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent-cyan);
            flex-wrap: wrap;
            justify-content: center;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 100px 5%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.6s var(--ease-smooth);
            position: relative;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent-cyan);
            box-shadow: 0 20px 50px rgba(0, 242, 255, 0.15);
        }

        .card:nth-child(1), .card:nth-child(7) {
            grid-column: span 2;
        }
        
        .card:nth-child(4), .card:nth-child(10) {
            grid-row: span 2;
        }

        .card-img-wrap {
            width: 100%;
            height: 300px;
            overflow: hidden;
            position: relative;
        }

        .card:nth-child(4) .card-img-wrap, 
        .card:nth-child(10) .card-img-wrap {
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
        }
        
        .card:nth-child(4) .card-content, 
        .card:nth-child(10) .card-content {
            margin-top: auto;
            position: relative;
            z-index: 1;
            background: linear-gradient(to top, #000, transparent);
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s var(--ease-smooth);
            filter: grayscale(20%);
        }

        .card:hover .card-img {
            transform: scale(1.1);
            filter: grayscale(0%);
        }

        .card-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card-meta {
            font-size: 0.75rem;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        .card-title {
            font-family: "Syne", sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.1;
            color: #fff;
        }

        .card-excerpt {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 999;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .modal-content {
            width: 60%;
            max-width: 900px;
            max-height: 80vh;
            background: #111;
            border: 1px solid var(--accent-cyan);
            padding: 60px;
            overflow-y: auto;
            position: relative;
            transform: translateY(50px);
            opacity: 0;
            transition: all 0.6s var(--ease-smooth);
            box-shadow: 0 0 100px rgba(0, 242, 255, 0.2);
        }

        .modal.active { pointer-events: auto; }
        .modal.active .modal-bg { opacity: 1; }
        .modal.active .modal-content { transform: translateY(0); opacity: 1; }

        .modal-close {
            position: absolute;
            top: 30px; right: 30px;
            background: none;
            border: none;
            color: #fff;
            font-family: "Space Grotesk", sans-serif;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 0.1em;
        }

        .modal-body h2 {
            font-family: "Syne", sans-serif;
            font-size: 3rem;
            margin-bottom: 30px;
            line-height: 1;
            color: var(--accent-cyan);
        }

        .modal-body p {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background-color: var(--accent-cyan);
            padding: 20px 0;
            margin-top: 100px;
            transform: rotate(-2deg) scale(1.1);
        }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 20s linear infinite;
        }

        .ticker-item {
            display: inline-block;
            padding: 0 50px;
            font-family: "Syne", sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: #000;
            text-transform: uppercase;
        }

        footer {
            padding: 100px 0;
            text-align: center;
            color: #555;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .card:nth-child(n) { grid-column: auto; grid-row: auto; }
            .modal-content { width: 90%; padding: 40px; }
        }
        
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .hero-title { font-size: 14vw; }
            .nav-bar { padding: 20px; }
        }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>

    <nav class="nav-bar">
        <a href="#" class="logo">NEXUS</a>
        <div class="date-display" id="current-time"></div>
    </nav>

    <header>
        <h1 class="hero-title">BEYOND<br>TOMORROW</h1>
        <div class="hero-tags">
            <span>Tech</span> &bull; <span>Culture</span> &bull; <span>Avant-Garde</span>
        </div>
    </header>

    <main class="container">
        <div class="grid" id="grid">
        </div>
    </main>

    <div class="ticker-wrap">
        <div class="ticker">
            <div class="ticker-item">Design the Future</div>
            <div class="ticker-item">Question Reality</div>
            <div class="ticker-item">Explore the Unknown</div>
            <div class="ticker-item">Design the Future</div>
            <div class="ticker-item">Question Reality</div>
            <div class="ticker-item">Explore the Unknown</div>
        </div>
    </div>

    <footer>
        <p>&copy; <span id="year-range"></span> NEXUS. ALL SYSTEMS OPERATIONAL.</p>
    </footer>

    <div class="modal" id="modal">
        <div class="modal-bg" id="modal-bg"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">[ CLOSE ]</button>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Blob {
            constructor() {
                this.init();
            }
            
            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.r = Math.random() * 200 + 100; 
                this.color = Math.random() > 0.5 ? '#00f2ff' : '#bd00ff';
                this.life = 0;
                this.maxLife = Math.random() * 100 + 200;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life++;

                if(this.x < -this.r || this.x > width + this.r || this.y < -this.r || this.y > height + this.r || this.life > this.maxLife) {
                    this.init();
                }
            }

            draw() {
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
                gradient.addColorStop(0, this.color + '44'); 
                gradient.addColorStop(1, 'transparent');
                
                ctx.globalCompositeOperation = 'screen';
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
            }
        }

        const blobs = Array.from({ length: 15 }, () => new Blob());

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            blobs.forEach(blob => {
                blob.update();
                blob.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();

        const articles = [
            {
                tag: "Tech",
                title: "The Rise of Synthetic Reality",
                image: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?auto=format&fit=crop&w=800&q=80",
                excerpt: "As VR and AR merge with daily life, we question what it means to be 'present' in a physical world.",
                content: "We are standing on the precipice of a new existence. The screens that once sat on our desks are now moving to our eyes. Spatial computing is not just an interface update; it is a rewriting of human perception. When the digital overlay becomes indistinguishable from the physical substrate, where does the simulation end and life begin?"
            },
            {
                tag: "Urban",
                title: "Megacity Entropy",
                image: "https://images.unsplash.com/photo-1734059013972-e6fab175bf65?auto=format&fit=crop&w=800&q=80",
                excerpt: "The beauty of chaos in the sprawling, vertical metropolises of the future.",
                content: "As populations swell and cities climb higher into the clouds, a new aesthetic emerges. It is not the clean lines of utopia, but the layered, cable-strewn reality of density. In the shadows of the megastructures, life finds a way to adapt, creating a vibrant ecosystem of neon and noise."
            },
            {
                tag: "Design",
                title: "Brutalism Reborn",
                image: "https://images.unsplash.com/photo-1486718448742-163732cd1544?auto=format&fit=crop&w=800&q=80",
                excerpt: "Why raw concrete and imposing geometric forms are making a massive comeback in digital design.",
                content: "Soft shadows and rounded corners are out. The new web is sharp, heavy, and raw. Neo-Brutalism rejects the overly polished aesthetic of the last decade in favor of high contrast, default fonts, and visible grids. It is honest design for a chaotic era."
            },
            {
                tag: "Culture",
                title: "The Digital Nomad Paradox",
                image: "https://images.unsplash.com/photo-1527192491265-7e15c55b1ed2?auto=format&fit=crop&w=800&q=80",
                excerpt: "Living everywhere and nowhere. The psychological toll of total location independence.",
                content: "We dreamed of working from Bali beaches and Parisian cafes. But the reality of the nomad life is often one of profound disconnection. When your background changes every month, your sense of self begins to blur. We are discovering that 'home' is not just a place, but a necessary anchor for the human psyche."
            },
            {
                tag: "AI",
                title: "Generative Artistry",
                image: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80",
                excerpt: "Is the machine a tool or a creator? Exploring the blurred lines of authorship.",
                content: "The algorithm does not sleep, does not eat, and does not suffer. Yet it produces images of haunting beauty. As we collaborate with neural networks, we are finding that creativity is not a uniquely human spark, but a pattern that can be decoded, replicated, and perhaps, expanded."
            },
            {
                tag: "Sound",
                title: "Synthwave Nostalgia",
                image: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=800&q=80",
                excerpt: "Longing for a future that never happened through the sounds of analog synthesizers.",
                content: "The 1980s imagined a future of flying cars and chrome cities. We didn't get that future, but we kept the soundtrack. Synthwave is more than music; it is an aesthetic movement, a collective memory of a neon-soaked timeline that exists only in our dreams."
            },
            {
                tag: "Future",
                title: "Interplanetary Architecture",
                image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800&q=80",
                excerpt: "Designing habitats for Mars means rethinking everything we know about construction.",
                content: "On Mars, there is no wood, no steel, no cement. There is only regolith and radiation. The architects of the next century will be 3D printing structures using local soil, designing hives that protect us from the void while reminding us of Earth."
            },
            {
                tag: "Mind",
                title: "Dopamine Fasting",
                image: "https://images.unsplash.com/photo-1499209974431-9dddcece7f88?auto=format&fit=crop&w=800&q=80",
                excerpt: "Resetting the brain's reward system in an age of instant gratification.",
                content: "We are drowning in cheap pleasure. The scroll, the like, the notification. To regain control, we must embrace boredom. We must stare at walls. We must sit in silence. Only by starving the distraction beast can we feed the deep-focus mind."
            },
            {
                tag: "Style",
                title: "Techwear Aesthetics",
                image: "https://images.unsplash.com/photo-1523398002811-999ca8dec234?auto=format&fit=crop&w=800&q=80",
                excerpt: "Utility meets dystopia. Fashion prepared for the end of the world.",
                content: "Straps, buckles, waterproof fabrics. Techwear is fashion for the urban survivor. It assumes the city is a hostile environment. It is the uniform of the cyberpunk protagonist, blending into the shadows while being ready for anything."
            },
            {
                tag: "Nature",
                title: "Bio-Luminescence",
                image: "https://images.unsplash.com/photo-1560264280-88b68371db39?auto=format&fit=crop&w=800&q=80",
                excerpt: "Using nature's own light sources to illuminate our cities sustainably.",
                content: "Imagine trees that glow at night, replacing streetlamps. Imagine algae tanks that light up our living rooms. The future of lighting is not LED, it is DNA. By splicing bio-luminescent genes into flora, we could create an Avatar-like world of organic illumination."
            },
            {
                tag: "Gaming",
                title: "The Metaverse Mirage",
                image: "https://images.unsplash.com/photo-1535223289827-42f1e9919769?auto=format&fit=crop&w=800&q=80",
                excerpt: "Why digital land is booming while physical malls are dying.",
                content: "We are buying clothes that cannot be worn and land that cannot be walked on. The economy of the virtual is realer than ever. But as we migrate into the servers, we must ask: what happens to the bodies we leave behind in the chair?"
            },
            {
                tag: "Food",
                title: "Lab-Grown Gastronomy",
                image: "https://images.unsplash.com/photo-1530836369250-ef72a3f5cda8?auto=format&fit=crop&w=800&q=80",
                excerpt: "Steak without the cow. The ethical and culinary revolution of cellular agriculture.",
                content: "It looks like meat. It cooks like meat. It tastes like meat. But it was grown in a sterile bioreactor. This is the end of the slaughterhouse and the beginning of a new culinary era where we can design textures and flavors that nature never intended."
            },
            {
                tag: "Crypto",
                title: "The Decentralized Web",
                image: "https://images.unsplash.com/photo-1639762681485-074b7f938ba0?auto=format&fit=crop&w=800&q=80",
                excerpt: "Taking back ownership of our data from the silicon giants.",
                content: "Web3 is a chaotic, scam-ridden, yet hopeful frontier. The dream is simple: own your identity. Own your content. Cut out the middleman. It is the Wild West of code, and the sheriffs have not arrived yet."
            },
            {
                tag: "Auto",
                title: "Electric Dreams",
                image: "https://images.unsplash.com/photo-1563720223185-11003d516935?auto=format&fit=crop&w=800&q=80",
                excerpt: "The silence of the engine and the death of the gas station aesthetic.",
                content: "The roar of the V8 is dying. The future is silent torque. But we will miss the smell of gasoline? The grit of the garage? Electric cars are computers on wheels, sterile and efficient. We are trading soul for survival."
            },
            {
                tag: "Space",
                title: "The Silent Void",
                image: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=800&q=80",
                excerpt: "Looking up and realizing how terribly alone and small we really are.",
                content: "Space exploration is the ultimate exercise in perspective. The Pale Blue Dot. The sheer scale of the nothingness between stars. It is terrifying, yet it drives us to connect, to preserve, and to explore. We are the universe observing itself."
            },
            {
                tag: "Code",
                title: "Hacking the Human",
                image: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?auto=format&fit=crop&w=800&q=80",
                excerpt: "Bio-hacking and the quest for immortality through technology.",
                content: "Implants, nootropics, gene editing. We are treating the human body like legacy software that needs a patch. Transhumanism is no longer sci-fi; it is a lifestyle choice for those who believe death is just a technical error to be solved."
            }
        ];

        function generateDates(n) {
            let d = new Date();
            let res = [];
            
            let firstGap = Math.floor(Math.random() * 3) + 1;
            d.setDate(d.getDate() - firstGap);
            res.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }));

            for(let i=1; i<n; i++) {
                let gap = Math.floor(Math.random() * 40) + 10;
                d.setDate(d.getDate() - gap);
                res.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }));
            }
            return res;
        }

        const dates = generateDates(articles.length);
        const grid = document.getElementById('grid');

        articles.forEach((art, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const isTextOverlay = (i === 3 || i === 9); 
            
            let htmlContent = '';
            
            if(isTextOverlay) {
                htmlContent = `
                    <div class="card-img-wrap">
                        <img src="${art.image}" class="card-img" alt="${art.title}">
                    </div>
                    <div class="card-content">
                        <div class="card-meta">
                            <span>${art.tag}</span>
                            <span>${dates[i]}</span>
                        </div>
                        <h3 class="card-title">${art.title}</h3>
                    </div>
                `;
            } else {
                htmlContent = `
                    <div class="card-img-wrap">
                        <img src="${art.image}" class="card-img" alt="${art.title}">
                    </div>
                    <div class="card-content">
                        <div class="card-meta">
                            <span>${art.tag}</span>
                            <span>${dates[i]}</span>
                        </div>
                        <h3 class="card-title">${art.title}</h3>
                        <p class="card-excerpt">${art.excerpt}</p>
                    </div>
                `;
            }
            
            card.innerHTML = htmlContent;
            
            card.style.opacity = '0';
            card.style.transform = 'translateY(50px)';
            
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, i * 100);

            card.onclick = () => openModal(art, dates[i]);
            grid.appendChild(card);
        });

        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modal-body');
        const modalBg = document.getElementById('modal-bg');
        const modalClose = document.getElementById('modal-close');

        function openModal(data, date) {
            modalBody.innerHTML = `
                <span style="color:var(--accent-purple); text-transform:uppercase; letter-spacing:0.2em;">// ${data.tag} &bull; ${date}</span>
                <h2>${data.title}</h2>
                <img src="${data.image}" style="width:100%; height:300px; object-fit:cover; margin-bottom:30px; border-radius:8px;">
                <p>${data.content}</p>
                <p>${data.content}</p> 
            `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        modalClose.onclick = closeModal;
        modalBg.onclick = closeModal;
        document.onkeydown = (e) => { if(e.key === 'Escape') closeModal(); };

        const now = new Date();
        const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' };
        document.getElementById('current-time').textContent = now.toLocaleDateString('en-US', options);
        
        const currentYear = now.getFullYear();
        document.getElementById('year-range').textContent = `${currentYear - 2} - ${currentYear}`;
    </script>
</body>
</html>
